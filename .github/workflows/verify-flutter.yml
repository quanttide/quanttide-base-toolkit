name: ci-flutter
on:
  push:
    branches: [main]
    paths: ['packages/flutter/**']
  pull_request:
    branches: [main]
    paths: ['packages/flutter/**']
jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.x
      - run: flutter pub get
      - run: flutter analyze lib/ test/
      - run: flutter test
