[project]
name = "quanttide"
version = "0.1.0"
description = "量潮基础工具箱（Python SDK）"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    { name = "QuantTide Inc.", email = "opensource@quanttide.com" },
]
dependencies = [
    "platformdirs>=4.9.6",
    "pydantic>=2.13.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.13",
]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.coverage.run]
omit = ["src/quanttide/__init__.py"]
exclude_lines = [
    "pragma: no cover",
    "except PermissionError:",
    "except OSError:",
    "if __name__ == .__main__.:",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
